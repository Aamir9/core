<section class="content-header">
    <div class="container-fluid">
      <div class="row">
        <div class="col-6">
          <h1>{{ "Import Data Detail" | localize }}</h1>
        </div>
        <div class="col-6 text-right">

        </div>
      </div>
    </div>
  </section>
    <section class="content px-2">
        <div class="container-fluid">
            <div class="card">
                <div class="card-body">
                  <div class="table-responsive">
                    <table class="table table-striped table-bordered">
                      <thead class="bg-light">
                        <tr>
                          <th>{{ "Id" | localize }}</th>
                          <th>{{ "Type" | localize }}</th>
                          <th>{{ "Title" | localize }}</th>
                          <th>{{ "Action" | localize }}</th>
                        </tr>
                      </thead>
                      <tbody>
                       <ng-container *ngIf="!isProcessing">
                          <tr *ngFor="let history of syncHistoryDetails">
                            <td>{{ history.id }}</td>
                            <td>{{ history.historyType}}</td>
                            <td>{{ history.historyObjectTitle}}</td>
                            <td><i class="fas fa-eye pointer" (click)="viewDetail(history.historyObjectId,history.historyType)"></i></td>
                          </tr>

                          <tr *ngIf="syncHistoryDetails.length == 0">
                            <td colspan="4" style="text-align: center;">
                                No records found
                            </td>
                          </tr>
                       </ng-container>
                        <tr *ngIf="isProcessing">
                            <td colspan="4" style="text-align: center;">
                                <span>
                                    <i class="fa fa-spinner fa-spin"></i>
                                </span>
                            </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
        </div>
    </section>
