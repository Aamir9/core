<div class="modal-header">
    <h4 class="modal-title">Activity Details</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="bsModalRef.hide()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 1 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
        </svg>
      </button>
      
      
  </div>
  <div class="modal-body">
    <div class="container-fluid">
      <!-- Row 1 -->
      <div class="row mb-3">
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Date:</strong></label>
          <input type="text" class="form-control" [value]="activity?.date | date" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Name:</strong></label>
          <input type="text" class="form-control" [value]="activity?.name" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Follow-Up Date:</strong></label>
          <input type="text" class="form-control" [value]="activity?.followUpDate | date" readonly>
        </div>
      </div>
  
      <!-- Row 2 -->
      <div class="row mb-3">
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Follow-Up Type:</strong></label>
          <input type="text" class="form-control" [value]="activity?.followUpTypeName" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Employee:</strong></label>
          <input type="text" class="form-control" [value]="activity?.employeeName" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Customer / Supplier Name:</strong></label>
          <input type="text" class="form-control" [value]="activity?.customerName" readonly>
        </div>
      </div>
  
      <!-- Row 3 -->
      <div class="row mb-3">
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Customer / Supplier Email:</strong></label>
          <input type="text" class="form-control" [value]="activity?.customerEmail" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Group Name:</strong></label>
          <input type="text" class="form-control" [value]="activity?.groupName" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Activity Type:</strong></label>
          <input type="text" class="form-control" [value]="activity?.activityTypeName" readonly>
        </div>
      </div>
  
      <!-- Row 4 -->
      <div class="row mb-3">
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Creation Time:</strong></label>
          <input type="text" class="form-control" [value]="activity?.creationTime | date" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Room Name:</strong></label>
          <input type="text" class="form-control" [value]="activity?.roomName || 'N/A'" readonly>
        </div>
        <div class="col-4 col-md-4 col-sm-12">
          <label class="form-label"><strong>Note:</strong></label>
          <input type="text" class="form-control" [value]="activity?.note || 'No Notes'" readonly>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="bsModalRef.hide()">Close</button>
  </div>
