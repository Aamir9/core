<div [@routerTransition]>
    <form>
      <section class="content-header">
        <div class="container-fluid">
          <div class="d-flex flex-row justify-content-between">
            <div>
              <!-- <h4>{{ "SupplierDetails" | localize }}</h4> -->
            </div>
            <div>
              <a href="javascript:;" class="btn bg-blue mr-2" (click)="showCreateOrEditGroupDialog()">
                <i class="fa fa-plus-square"></i> {{ "Create" | localize }}
              </a>
              
            </div>
          </div>
        </div>
      </section>
     
      <div class="container-fluid">
        <tabset>
          <tab heading="SupplierDetails" id="tab1">

            <div class="row mt-3 ">
                <div class="col-12 d-flex align-items-center justify-content-between">
                    <h4 class="font-weight-bold ">Basic Information</h4>
                    <div class="d-flex align-items-center justify-content-end">
                      <p class="m-0 mr-3">Supplier is Active</p>
                      <div class="toggle-switch">
                        <input
                          type="checkbox"
                          id="showResultSubEntries"
                          class="toggle-input"
                          [(ngModel)]="supplier.isActive"
                        />
                        <label for="showResultSubEntries" class="toggle-label m-0"></label>
                      </div>
                    </div>
                  </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group d-flex flex-column required">
                        <label class="col-form-label" for="name">
                            {{ "UserName" | localize }}
                        </label>
                        <div>
                            <input type="text" class="form-control" name="UserName" id="UserName" required
                                [(ngModel)]="supplier.userName" #userNameModel="ngModel" #userNameKindEl />
                            <abp-validation-summary [control]="userNameModel" [controlEl]="userNameKindEl"></abp-validation-summary>
                        </div>
                    </div>
                </div>
    
                <div class="col-md-4">
                    <div class="form-group d-flex flex-column required">
                        <label class="col-form-label" for="name">
                            {{ "Name" | localize }}
                        </label>
                        <div>
                            <input type="text" class="form-control" name="Name" id="Name" required
                                [(ngModel)]="supplier.name" #nameModel="ngModel" #nameKindEl />
                            <abp-validation-summary [control]="nameModel" [controlEl]="nameKindEl"></abp-validation-summary>
                        </div>
                    </div>
                </div>
    
            
          
                <div class="col-md-4">
                    <div class="form-group d-flex flex-column required">
                        <label class="col-form-label" for="name">
                            {{ "Email" | localize }}
                        </label>
                        <div>
                            <input type="text" class="form-control" name="Email" id="Email" required
                                [(ngModel)]="supplier.emailAddress" #emailModel="ngModel" #emailKindEl />
                            <abp-validation-summary [control]="emailModel" [controlEl]="emailKindEl"></abp-validation-summary>
                        </div>
                    </div>
                </div>
    
                <div class="col-md-4">
             
                    <div class="form-group d-flex flex-column required">
                        <label class="col-form-label" for="name">
                            {{ "Password" | localize }}
                        </label>
                         <div>
                            <input type="password" class="form-control" name="Password" id="Password" required
                             [(ngModel)]="supplier" #passwordModel="ngModel" #passwordKindEl />
                            <abp-validation-summary [control]="passwordModel" [controlEl]="passwordKindEl"></abp-validation-summary>
                        </div> 
                    </div>
                </div>
        
                    <!-- surname -->
                    <div class="col-md-4">
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "Surname" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="Surname" id="Surname" required
                                    [(ngModel)]="supplier.surname" #surnameModel="ngModel" #surnameKindEl />
                                <abp-validation-summary [control]="surnameModel" [controlEl]="surnameKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        
    
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "SupplierNo" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="SupplierNo" id="SupplierNo" required
                                    [(ngModel)]="supplier.supplierNo" #supplierNoModel="ngModel" #supplierNoKindEl />
                                <abp-validation-summary [control]="supplierNoModel" [controlEl]="supplierNoKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
    
    
                    <div class="col-md-4">
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "Postcode" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="Postcode" id="Postcode" required
                                    [(ngModel)]="supplier.postcode" #postcodeModel="ngModel" #postcodeKindEl />
                                <abp-validation-summary [control]="postcodeModel" [controlEl]="postcodeKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
    
                    <!-- townCity -->
                    <div class="col-md-4">
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "TownCity" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="TownCity" id="TownCity" required
                                    [(ngModel)]="supplier.townCity" #townCityModel="ngModel" #townCityKindEl />
                                <abp-validation-summary [control]="townCityModel" [controlEl]="townCityKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "Address" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="Address" id="Address" required
                                    [(ngModel)]="supplier.address" #addressModel="ngModel" #addressKindEl />
                                <abp-validation-summary [control]="addressModel" [controlEl]="addressKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
                    <!-- telephone -->
                    <div class="col-md-4">
                        <div class="form-group d-flex flex-column required">
                            <label class="col-form-label" for="name">
                                {{ "Telephone" | localize }}
                            </label>
                            <div>
                                <input type="text" class="form-control" name="Telephone" id="Telephone" required
                                    [(ngModel)]="supplier.telephone" #telephoneModel="ngModel" #telephoneKindEl />
                                <abp-validation-summary [control]="telephoneModel" [controlEl]="telephoneKindEl"></abp-validation-summary>
                            </div>
                        </div>
                    </div>
                </div> <hr>
                <div class="p-2">
                    <div class="row mt-0">
                      <div class="col-md-12 d-flex justify-content-end align-items-center">
                        <button class="btn bg-blue mr-4" (click)="save()">
                          {{ "Save" | localize }}
                        </button>
                        <button class="btn btn-outline-secondary mr-1" (click)="back()">
                          {{ "Back" | localize }}
                        </button>
                      </div>
                    </div>
                  </div>
          </tab>
          <tab [heading]="'PhoneCallNote' | localize">
            <div class="form-group row mb-0 w-100">
                <div *ngIf="supplier.userId > 0" class="w-100">
                  <app-phone-call-activity [selectedSuppler]="supplier.userId">
                  </app-phone-call-activity>
                </div>
              </div>
          </tab>
          <tab [heading]="'SmsNote' | localize" >
            <div class="form-group row mb-0 w-100">
                <div *ngIf="supplier.userId" class="w-100">
                  <app-sms-activity [selectedSupplier]="supplier.userId">
                  </app-sms-activity>
                </div>
              </div>
          </tab>
          <tab [heading]="'EmailNote' | localize">
            <div class="form-group row mb-0 w-100">
                <div *ngIf="supplier.id > 0" class="w-100">
                  <app-email-activity [selectedSupplier]="supplier">
                  </app-email-activity>
                </div>
              </div>
          </tab>
        </tabset>


      </div>
      </form>
    </div>
