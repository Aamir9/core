
<div [@routerTransition]>
    <section class="content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-6">
              <!-- <h1>{{ "Suppliers" | localize }}</h1> -->
            </div>
            <div class="col-6 text-right" *ngIf="isAdminUser()">
              <a href="javascript:;" class="btn bg-blue" (click)="showCreateOrEditGroupDialog()">
                <i class="fa fa-plus-square"></i>
                {{ "Create" | localize }}
              </a>
            </div>
          </div>
        </div>
      </section>
    



 <section class="content px-2">
    <div class="container-fluid">
        <div class="card">
            <div class="card-header">
                <div class="row">
                  <div class="col-md-6">&emsp;</div>
                  <div class="col-md-6">
                    <div class="input-group">
                      <!-- <div class="input-group-prepend">
                        <button type="button" class="btn bg-blue" (click)="getDataPage(1)">
                          <i class="fas fa-search"></i>
                        </button>
                      </div> -->
                      <input type="text" class="form-control" name="keyword" [placeholder]="'SearchWithThreeDot' | localize"
                        [(ngModel)]="keyword" (keyup.enter)="getDataPage(1)"
                        (ngModelChange)="getDataPage(1)"
                        />
                    </div>
                  </div>
                </div>
               
              </div>

              <div class="card-body">
                <div class="table-responsive">
                    <table class="table table table-bordered" [busy]="isTableLoading">
                        <thead class="bg-light">
                          <tr>
                         
                            <th> {{"Name" | localize}}</th>
                            <th> {{"EmailAddress" | localize}}</th>
                            <th class="d-flex justify-content-center" >{{ "Actions" | localize }}</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr *ngFor="
                          let suppiler of suppilers
                            | paginate
                              : {
                                  id: 'server',
                                  itemsPerPage: pageSize,
                                  currentPage: pageNumber,
                                  totalItems: totalItems
                                }
                        ">
                          
                        
                            <td>{{ suppiler.name }}</td>
                            <td>{{ suppiler.emailAddress }}</td>
                   
                            <td >
                             <div class="d-flex justify-content-center" >
                              <ng-container
                              [ngTemplateOutlet]="tableActionMenu"
                              [ngTemplateOutletContext]="{
                               suppiler : suppiler
                              }"
                            ></ng-container>
                             </div>


                              
                              <!-- <a href="javascript:;"  class="btn bg-secondary mr-1"  (click)="showCreateOrEditGroupDialog(item.id)">
                                <i class="fa fa-pencil-alt"></i>
                               
                              </a> 
          
                              <a href="javascript:;"  class="btn bg-danger mr-1" (click)="delete(item)" >
                                <i class="fas fa-trash"></i>
                               
                              </a> -->

          
                            </td>
                          </tr>
                        </tbody>
                      </table>
                </div>
              </div>

              <ng-template
              #tableActionMenu
              let-suppiler="suppiler"
             
            >
              <span dropdown class="table-action" container="body">
                <a
                  href
                  id="button-basic"
                  dropdownToggle
                  aria-controls="dropdown-basic"
                  (click)="(false)"
                >
                  <i class="fas fa-ellipsis-h table-action-menu-icon"></i>
                </a>
                <ul
                  id="dropdown-basic"
                  *dropdownMenu
                  class="dropdown-menu dropdown-menu-right table-action-menu"
                  role="menu"
                  aria-labelledby="button-basic"
                >
                  <li class="disabled" role="menuitem">
                    <a class="dropdown-item disabled table-action-menu-header">
                      <span class="text-secondary">Actions</span>
                      <i class="fas fa-ellipsis-h table-action-menu-icon-active"></i
                    ></a>
                  </li>
                   <li role="menuitem">
                    <a
                      class="dropdown-item table-action-menu-item"
                    (click)="SupplierDetails(suppiler)"
                       routerLinkActive="router-link-active"
                      ><i class="fas fa-eye"></i>View Details</a
                    >
                  </li>
                  <li role="menuitem">
                    <a
                      class="dropdown-item table-action-menu-item"
                      [routerLink]="['/app/activities']"
                    
                      routerLinkActive="router-link-active"
                      ><i class="fas fa-eye"></i>View Activities</a
                    >
                  </li>
                  <li role="menuitem">
                    <a class="dropdown-item table-action-menu-item" (click)="showCreateOrEditGroupDialog(suppiler)"
                      ><i class="fas fa-pencil-alt"></i>Edit</a
                    >
                  </li>
                  <li role="menuitem">
                    <a class="dropdown-item table-action-menu-item" (click)="delete(suppilers)"
                      ><i class="fas fa-times-circle text-danger"></i>Delete</a
                    >
                  </li>
                </ul>
              </span>
            </ng-template>

              <div class="card-footer table-card-footer bg-light border-top">
                <div class="row">
                    <div class="col-sm-4 col-12 text-sm-left text-center">
                        <button class="btn btn-secondary" (click)="refresh()">
                            <i class="fas fa-redo-alt"></i>
                        </button>
                    </div>
                    <div class="col-sm-4 col-12 text-center">
                        <p class="mb-0 my-2">
                            {{ "TotalRecordsCount" | localize: totalItems }}
                        </p>
                    </div>
                    <div class="col-sm-4 col-12">
                        <div class="float-sm-right m-auto">
                            <abp-pagination-controls id="server" (pageChange)="getDataPage($event)">
                            </abp-pagination-controls>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
 </section>
</div>
