<div class="m-3 pb-3">
  <div class="d-flex align-items-center justify-content-end">
    <button class="btn btn-primary" (click)="onSaveClick()">Save Changes</button>
  </div>
  <div
    class="form-group align-items-center"
    *ngFor="let item of menuItems; let i = index"
  >
    <div class="d-flex align-items-center justify-content-center ">
      <input
        class="formControl mr-3 mt-4 "
        type="checkbox"
        name="{{ 'isActive' + i }}"
        [checked]="item.isActive"
        [(ngModel)]="item.isActive"
      />
      <div class="mr-3">
        <small>Menu Name</small>
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            name="{{ 'menuItem' + i }}"
            [(ngModel)]="item.name"
            [placeholder]="'Menu Name'"
            required
            maxlength="25"
          />
        </div>
      </div>
      <div>
        <small>Order No</small>
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            name="userNameOrEmailAddress"
            [(ngModel)]="item.orderNo"
            [placeholder]="'Order No'"
            required
            maxlength="25"
          />
        </div>
      </div>
    </div>
  </div>
</div>
