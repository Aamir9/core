<nav class="sidebar" > 
  <ul 
    class="nav nav-pills nav-sidebar flex-column"
    data-widget="treeview"
    role="menu"
    data-accordion="false"
  >
    <ng-container *ngFor="let item of menuItems">
      <ng-container
        *ngTemplateOutlet="sidebarInner; context: { item: item, depth: 1 }"
      ></ng-container>
    </ng-container>
  </ul>
</nav>

<ng-template #sidebarInner let-item="item" let-depth="depth">
  <li
    *ngIf="isMenuItemVisible(item)"
    class="nav-item"
    [class.menu-open]="!item.isCollapsed"
    [class.has-treeview]="item.children"
  >
    <a
      *ngIf="item.route && item.route.indexOf('http') != 0"
      class="nav-link d-flex align-items-center"
      [routerLink]="item.route"
      routerLinkActive="active"
      [class.active]="item.isActive"
    >
      <i class="nav-icon {{ item.icon }} me-2"></i>
      <p class="mb-0">{{ item.label }}</p>
    </a>
    <a
      *ngIf="item.route && item.route.indexOf('http') == 0 && !item.children"
      class="nav-link d-flex align-items-center"
      target="_blank"
      [href]="item.route"
    >
      <i class="nav-icon {{ item.icon }} me-2"></i>
      <p class="mb-0">{{ item.label }}</p>
    </a>
    <a
      *ngIf="!item.route && item.children"
      class="nav-link d-flex align-items-center"
      href="javascript:;"
      [class.active]="item.isActive"
      (click)="onMenuItemClick(item)"
    >
      <i class="nav-icon {{ item.icon }} me-2"></i>
      <p class="mb-0">{{ item.label }}</p>
      <i class="right fas fa-angle-left ms-auto"></i>
    </a>
    <ul
      *ngIf="item.children"
      class="nav nav-treeview"
      [collapse]="item.isCollapsed"
      [isAnimated]="true"
      [style.margin-left.px]="depth * 20"
    >
      <ng-container *ngFor="let child of item.children">
        <ng-container
          *ngTemplateOutlet="
            sidebarInner;
            context: { item: child, depth: depth + 1 }
          "
        ></ng-container>
      </ng-container>
    </ul>
  </li>
</ng-template>
