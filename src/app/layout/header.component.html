<ng-template #checkInModalTemplate>
  <abp-modal-header
    [title]="'Check In' | localize"
    (onCloseClick)="_modalService.hide(1)"
  ></abp-modal-header>
  <div class="modal-body">
    <div class="row">
      <div class="col-12">
        <span>{{ "Notes" | localize }}:</span>
        <textarea
          type="text"
          class="form-control"
          placeholder="Enter any notes"
          [(ngModel)]="checkInNote"
        ></textarea>
      </div>
    </div>
  </div>

<ng-template #checkOutModalTemplate>
  <abp-modal-header
    [title]="'Check Out' | localize"
    (onCloseClick)="_modalService.hide(1)"
  ></abp-modal-header>
  <div class="modal-body">
    <div class="row">
      <div class="col-12">
        <span>{{ "Notes" | localize }}:</span>
        <textarea
          type="text"
          class="form-control"
          placeholder="Enter any notes"
          [(ngModel)]="checkOutNote"
        ></textarea>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-end mb-2">
    <button
      class="btn btn-secondary mr-3"
      [disabled]="saving"
      (click)="_modalService.hide(1)"
    >
      {{ "Cancel" | localize }}
    </button>
    <button
      class="btn btn-primary mr-3"
      [disabled]="saving"
      (click)="createCheckOut()"
    >
      {{ "Check Out" | localize }}
    </button>
  </div>
</ng-template>
