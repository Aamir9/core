    </div>
    <div class="row">
  <div class="col-md-3">
          <label for=""> <strong>Follow up</strong></label> <br>
          <div>

              <label class="form-check-label" for="flexRadioDefault1">Group</label> &nbsp; &nbsp; &nbsp; &nbsp;
              <input class="form-check-input" id="flexRadioDefault1" type="radio" name="FollowupType"
                  (click)="setGroupRadioActive(true)" [checked]="isGroupRadioActive">

              <label class="form-check-label" for="flexRadioDefault2">Employee</label> &nbsp; &nbsp;
              &nbsp;&nbsp;&nbsp;
              <input class="form-check-input" id="flexRadioDefault2" type="radio" name="FollowupType"
                  (click)="setGroupRadioActive(false)" [checked]="isGroupRadioActive == false">

          </div>
      </div>
      <div class="col-md-9">
          <div *ngIf="isGroupRadioActive">
              <div class="form-group d-flex flex-column ">
                  <label class="col-form-label" for="groupId">
                      {{ " Follow Up Group" | localize }}
                  </label>
                  <div>
                      <select class="form-control" name="groupId" [(ngModel)]="createTicketDto.groupId"
                          id="groupId">
                          <option *ngFor="let group of groups" [value]="group.id">
                              {{ group.name}}
                          </option>
                      </select>


                  </div>
              </div>
          </div>
          <div *ngIf="!isGroupRadioActive">
              <div class="form-group d-flex flex-column ">
                  <label class="col-form-label" for="employeeId">
                      {{ " Follow Up Employee" | localize }}
                  </label>
                  <div>
                      <select type="text" placeholder="Employee Input" class="form-control" name="employeeId"
                          id="employeeId" [(ngModel)]="createTicketDto.employeeId" #employeeIdEl>
                          <option *ngFor="let employee of employees" [value]="employee.id">
                              {{ employee.fullName }}
                          </option>
                      </select>


                  </div>
              </div>
          </div>
      </div>
  </div>
    <div class="form-group row required">
      <label class="col-md-3 col-form-label" for="description">
        {{ "Description" | localize }}
      </label>
      <div class="col-md-9">
        <textarea
          type="text"
          class="form-control"
          name="description"
          id="description"
        disabled
          [(ngModel)]="createTicketDto.comment"

        ></textarea>

      </div>
    </div>
  </div>
  <abp-modal-footer
    [cancelDisabled]="saving"
    [saveDisabled]="!createFaultModal.form.valid || saving"
    (onCancelClick)="bsModalRef.hide()"
  ></abp-modal-footer>
</form>
