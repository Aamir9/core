<form class="form-horizontal" autocomplete="off" #createFaultModal="ngForm" (ngSubmit)="createTicket()">
    <abp-modal-header [title]="'Create New Ticket' | localize" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>
    <div class="modal-body" style="height: 50vh;overflow:auto">
        <div class="row">

            <div class="col-12">
                <div class="form-group row required">
                    <label class="col-md-3 col-form-label" for="emailAddress">
                        {{ "Email Address" | localize }}
                    </label>
                    <div class="col-md-9">
                        <input type="email" class="form-control" name="emailAddress" id="emailAddress" required
                            maxlength="256" pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{1,})+$"
                            [(ngModel)]="createTicketDto.email" #emailAddressModel="ngModel" #emailAddressEl />
                        <abp-validation-summary [control]="emailAddressModel" [controlEl]="emailAddressEl">
                        </abp-validation-summary>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="form-group row required">
                    <label class="col-md-3 col-form-label" for="name">
                        {{ "Ticket Date" | localize }}
                    </label>
                    <div class="col-md-9">
                        <input type="datetime-local" class="form-control" name="name" id="name" required
                            [(ngModel)]="createTicketDto.date" #toDateModel="ngModel" #toDateEl />
                        <abp-validation-summary [control]="toDateModel" [controlEl]="toDateEl"></abp-validation-summary>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="form-group d-flex flex-column row required">
                    <label class="col-md-3 col-form-label" for="companyLogo">
                        {{ "Add Image" | localize }}
                    </label>
                    <app-upload-photo class="ml-auto mr-auto text-center"
                        (onFileUpload)='onFileUploadHandler($event)'></app-upload-photo>
                    <div class="text-danger" *ngIf="isPhotoUploaded===false">
                        {{'kindly upload photo' | localize}}
                    </div>
                </div>
            </div>


        </div>

        <div class="form-group row required">
            <label class="col-md-3 col-form-label" for="description">
                {{ "Description" | localize }}
            </label>
            <div class="col-md-9">
                <textarea type="text" class="form-control" name="description" id="description" required maxlength="1024"
                    [(ngModel)]="createTicketDto.comment" #nameModel="ngModel" #nameEl></textarea>
                <abp-validation-summary [control]="nameModel" [controlEl]="nameEl"></abp-validation-summary>
            </div>
        </div>
    </div>
    <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!createFaultModal.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()"></abp-modal-footer>
