
<form autocomplete="off" #form1="ngForm" (ngSubmit)="save()">

  <abp-modal-header [title]="title | localize" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>
      <div class="modal-body">

          <div class="row">
              <div class="col-md-6">
                  <div>
                      <div class="form-group d-flex flex-column ">
                          <label class="col-form-label" for="group">
                              {{ "Groups" | localize }}
                          </label>
                          <select type="text" class="form-control" name="group"
                              [(ngModel)]="group.id" #groupModel="ngModel" #groupLineEl>
                              <option></option>
                              <option *ngFor="let group of groups" [value]="group.id">
                                  {{ group.name }}
                              </option>
                          </select>
                          <abp-validation-summary [control]="groupModel" [controlEl]="groupLineEl">
                          </abp-validation-summary>
                      </div>
                  </div>
              </div>
          </div>

      </div>
      <abp-modal-footer [cancelDisabled]="saving" [saveDisabled]="!form1.form.valid || saving"
          (onCancelClick)="bsModalRef.hide()"></abp-modal-footer>
</form>
