<form class="form-horizontal sleek-form"
      autocomplete="off"
      #editUserModal="ngForm"
      (ngSubmit)="save()">

  <abp-modal-header 
      [title]="'Contact Person  ' | localize"
      (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>

  <div class="modal-body" style="height: 60vh; overflow-y: auto;">
    <div *ngIf="isLoading" class="d-flex justify-content-center align-items-center" style="height: 50vh;">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="sr-only">Loading...</span>
      </div>
    </div>

    <div *ngIf="!isLoading">
 <!-- <tabset> -->
  <!-- <tab heading="{{ 'General' | localize }}"> -->
    <div class="row">
      <div class="col-md-12 d-flex justify-content-end">
        <div class="d-flex align-items-center" style="gap: 12px; margin-bottom: 8px;">
          <!-- Active Status Toggle -->
          <div class="custom-control custom-switch">
            <input
              type="checkbox"
              class="custom-control-input"
              id="isActive"
              name="isActive"
              [(ngModel)]="customer.isActive"
              autocomplete="off">

            <label class="custom-control-label" for="isActive">
              <span [ngClass]="{
                'text-success': customer.isActive,
                'text-danger': !customer.isActive
              }">
                {{ customer.isActive ? ('Enabled' | localize) : ('Disabled' | localize) }}
              </span>
            </label>
          </div>

          <button
            *ngIf="id"
            type="button"
            class="btn btn-outline-danger btn-sm d-flex align-items-center"
            (click)="deleteSubCustomer(customer)"
            [disabled]="saving"
            title="Delete Person">
            <span class="icon-wrapper">
              <i class="fas fa-trash"></i>
            </span>
            <span class="delete-text">{{ 'Delete' | localize }}</span>
          </button>
        </div>
      </div>
      <!-- First Name -->
      <div class="col-md-4">
        <div class="form-group required">
          <label>{{ "FirstName" | localize }}</label>
          <input 
            type="text" 
            class="form-control"
            name="name" 
            required maxlength="32"
            [(ngModel)]="customer.name"
            placeholder="{{ 'EnterFirstName' | localize }}"
            #nameModel="ngModel" #nameEl />
          <abp-validation-summary 
            [control]="nameModel"
            [controlEl]="nameEl">
          </abp-validation-summary>
        </div>
      </div>

      <!-- Last Name -->
      <div class="col-md-4">
        <div class="form-group required">
          <label>{{ "LastName" | localize }}</label>
          <input 
            type="text"
            class="form-control"
            name="surname"
            maxlength="32"
            [(ngModel)]="customer.surname"
            placeholder="{{ 'EnterLastName' | localize }}"
            #surnameModel="ngModel" #surnameEl />
          <abp-validation-summary 
            [control]="surnameModel"
            [controlEl]="surnameEl">
          </abp-validation-summary>
        </div>
      </div>

      <!-- Title -->
      <div class="col-md-4">
        <div class="form-group">
          <label>{{ "Title" | localize }}</label>
          <input 
            type="text"
            class="form-control"
            name="titel"
            maxlength="32"
            [(ngModel)]="customer.titel"
            placeholder="{{ 'EnterTitle' | localize }}"
            #titelModel="ngModel" #titelEl />
          <abp-validation-summary 
            [control]="titelModel"
            [controlEl]="titelEl">
          </abp-validation-summary>
        </div>
      </div>

      <!-- Username -->
      <!-- <div class="col-md-4">
        <div class="form-group required">
          <label>{{ "UserName" | localize }}</label>
        
          <input 
            type="text" disabled readonly
            class="form-control disabled"
            name="userName"
            required minlength="2" maxlength="32"
            [(ngModel)]="customer.userName"
            placeholder="{{ 'EnterUserName' | localize }}"
            #userNameModel="ngModel" #userNameEl />
          <abp-validation-summary 
            [control]="userNameModel"
            [controlEl]="userNameEl">
          </abp-validation-summary>
        </div>
      </div> -->

      <!-- Email Address -->
      <div class="col-md-4">
        <div class="form-group required">
          <label>{{ "Email" | localize }}</label>
          <input 
            type="email"
            class="form-control"
            name="emailAddress"
            required maxlength="256"
            [(ngModel)]="customer.emailAddress"
            placeholder="{{ 'EnterEmailAddress' | localize }}"
            #emailAddressModel="ngModel" #emailAddressEl />
          <abp-validation-summary 
            [control]="emailAddressModel"
            [controlEl]="emailAddressEl">
          </abp-validation-summary>
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label>{{ "Role" | localize }}</label>
          <ng-select 
            name="customerTypeId" 
            [(ngModel)]="customer.customerTypeId" 
            #roleModel="ngModel" 
            #roleEl
            placeholder="Select Role"
            [clearable]="true"
            [searchable]="true">
           <!-- <ng-option [value]="null" disabled>-- Select Role --</ng-option> -->
            <ng-option *ngFor="let customerType of customerTypes" [value]="customerType.id">
              {{ customerType.type }}
            </ng-option>
          </ng-select>
          <abp-validation-summary [control]="roleModel" [controlEl]="roleEl"></abp-validation-summary>
        </div>
      </div>
      <!-- Phone Number -->
      <div class="col-md-4">
        <div class="form-group required">
          <label>{{ "Phone" | localize }}</label>
          <input
            type="text"
            class="form-control"
            name="telephoneFax"
            required minlength="2"
            maxlength="32"
            [(ngModel)]="customer.telephoneFax"
            #telephoneFaxModel="ngModel"
            #telephoneFaxEl
            placeholder="Enter phone number" />
          <abp-validation-summary [control]="telephoneFaxModel" [controlEl]="telephoneFaxEl"></abp-validation-summary>
        </div>
      </div>

      <!-- Password (only for new sub-customer) -->
      <div class="col-md-4" *ngIf="!id">
        <div class="form-group required">
          <label>{{ "Password" | localize }}</label>
          <input 
            type="password"
            class="form-control"
            name="password"
            required maxlength="32"
            validateEqual="confirmPassword"
            reverse="true"
            [(ngModel)]="customer.password"
            #passwordModel="ngModel" #passwordEl />
            autocomplete="off"
          <abp-validation-summary 
            [control]="passwordModel"
            [controlEl]="passwordEl"
            [customValidationErrors]="passwordValidationErrors">
          </abp-validation-summary>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="col-md-4" *ngIf="!id">
        <div class="form-group required">
          <label>{{ "ConfirmPassword" | localize }}</label>
          <input 
            type="password"
            class="form-control"
            name="confirmPassword"
            required maxlength="32"
            validateEqual="password"
            reverse="false"
            ngModel
            #confirmPasswordModel="ngModel" #confirmPasswordEl />
            autocomplete="off"
          <abp-validation-summary 
            [control]="confirmPasswordModel"
            [controlEl]="confirmPasswordEl"
            [customValidationErrors]="confirmPasswordValidationErrors">
          </abp-validation-summary>
        </div>
      </div>

    
<div class="col-md-4">
   <div class="form-field">
        <label for="description">{{ "Note" | localize }}</label>
        <textarea
          id="description"
          name="description"
          maxlength="500"
          rows="1"
          [(ngModel)]="customer.description"
          #descriptionModel="ngModel"
          #descriptionEl
          placeholder="Enter Note"
        ></textarea>
        <abp-validation-summary [control]="descriptionModel" [controlEl]="descriptionEl"></abp-validation-summary>
      </div>  
    <!-- Custom Fields -->
   <!-- <app-custom-fields 
      *ngIf="isCustomFieldsAvailable"
      [customFields]="customer.customFields">
    </app-custom-fields> -->
    </div>

 <div class="col-md-4">
  <label class="form-label">Password</label>
  <div class="position-relative">
    <input 
      [type]="showPassword ? 'text' : 'password'"
      class="password-input form-control pe-5"
      [(ngModel)]="passwordValue"
      name="newPassword"
      placeholder="Enter new password"
    />
    <i class="fa"
       [ngClass]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"
       (click)="showPassword = !showPassword"
       class="password-eye"
       style="cursor: pointer; opacity: 0.7;">
    </i>
  </div>
 
  <button 
    type="button"
    class="btn btn-primary btn-sm mt-2"
    (click)="updatePassword()">
    Update Password
  </button>
</div> 


</div>
<!-- </tab> -->
   <!-- <tab [heading]="'Activies' | localize" class="pt-3 px-2">
          <div class="  row mb-0 w-100">
            <div *ngIf="customer.userId > 0" class="w-100">
              <app-activities [customerId]="customer.userId"></app-activities>
            </div>
          </div>
        </tab>
        
         <tab [heading]="'PhoneCallNote' | localize">
          <div class="  row mb-0 w-100">
            <div *ngIf="customer.id > 0" class="w-100">
              <app-phone-call-activity [selectedCustomer]="customer">
              </app-phone-call-activity>
            </div>
          </div>
        </tab> 
        -->

<!-- </tabset> -->
  </div>
  </div>

  <abp-modal-footer 
      [cancelDisabled]="saving"
      [saveDisabled]="isLoading || !editUserModal.form.valid || saving"
      (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
