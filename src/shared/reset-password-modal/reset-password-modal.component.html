<form class="form-horizontal sleek-form"
      autocomplete="off"
      #editUserModal="ngForm"
      (ngSubmit)=" updatePassword()">

  <abp-modal-header 
      [title]="'Reset Password' | localize"
      (onCloseClick)="bsModalRef.hide()">
  </abp-modal-header>
  <div class="modal-body" style="height: 30vh; overflow-y: auto;"  >
    
    <div class="mt-3" > 
  <label class="form-label">Password</label>
  <div class="position-relative">
    <input 
      [type]="showPassword ? 'text' : 'password'"
      class="password-input form-control pe-5"
      [(ngModel)]="passwordValue"
      name="newPassword"
      placeholder="Enter new password"
    />
    <i class="fa"
       [ngClass]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"
       (click)="showPassword = !showPassword"
       class="password-eye"
       style="cursor: pointer; opacity: 0.7;">
    </i>
  </div>

  <!-- <button 
    type="button"
    class="btn btn-primary btn-sm mt-2"
    (click)="updatePassword()">
    Update Password
  </button> -->
</div>
  </div>
   <abp-modal-footer 
      [cancelDisabled]="saving"
      [saveDisabled]="!editUserModal.form.valid || saving"
      (onCancelClick)="bsModalRef.hide()">
  </abp-modal-footer>

</form>
