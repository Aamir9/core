<div class="container chat-box">

  <h3 class=" text-center chat_header">Messenger</h3>
  <div class="row">
    <div class="col-6" >
      <div class="messaging">
        <div class="inbox_msg">
          <div class="mesgs" *ngIf="selectedCustomer">
            <h5>{{selectedCustomer.fullName}}</h5>
            <div #message class="msg_history">
              <div *ngFor="let msg of messages">
                <div class="incoming_msg" *ngIf="msg.type == 'received'">
                  <div class="incoming_msg_img"> </div>
                  <div class="received_msg">
                    <div class="received_withd_msg">
                      <p>
                        {{msg.message}}
                      </p>
                      <span class="time_date"> {{localDate(msg.date) | date:'medium'}} </span>
                    </div>
                  </div>
                </div>
                <div class="outgoing_msg" *ngIf="msg.type == 'sent'">
                  <div class="sent_msg">
                    <p>
                      {{msg.message}}
                    </p>
                    <span class="time_date"> {{localDate(msg.date) | date:'medium'}}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="type_msg">
              <div class="input_msg_write">
                <input type="text" class="write_msg" [value]="txtMessage" (input)="txtMessage=$event.target.value"
                  (keydown.enter)="sendMessage()" placeholder="Type a message" />
                <button class="msg_send_btn" type="button" (click)="sendMessage()"><i class="fa-solid fa-message"></i></button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="col-6 Customers-Card">
      <div class="card h-100">
        <div class="card-header">
          <h5 class="text-center">Customers</h5>
        </div>
        <div class="card-body">
          <div class="mb-1"  (click)="onCustomerClick(customer)" *ngFor="let customer of customers" >
            <div class="customer">
              <p class="m-0">
                <i class="fa-user fas nav-icon ml-1"></i>  {{customer.fullName}}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
   
  </div>
</div>
